    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      :root{
        --bg:#fafafa;--surface:#fff;--text:#111;--muted:#6b7280;
        --accent:#2563eb;--accent-bg:rgba(37,99,235,.07);
        --border:#e8eaed;--radius:18px;
        --body:'Manrope',system-ui,sans-serif;
        --fancy:'Playfair Display',Georgia,serif;
      }
      html{height:100%}
      body{
        min-height:100%;display:flex;flex-direction:column;
        align-items:center;justify-content:center;
        font-family:var(--body);background:var(--bg);color:var(--text);
        padding:16px;-webkit-font-smoothing:antialiased;
      }

      .card{
        width:100%;max-width:440px;
        background:var(--surface);border:1px solid var(--border);
        border-radius:var(--radius);
        padding:40px 28px 36px;
        box-shadow:0 1px 2px rgba(0,0,0,.04),0 8px 32px rgba(0,0,0,.06);
        animation:up .65s cubic-bezier(.16,1,.3,1) both;
      }
      @keyframes up{
        from{opacity:0;transform:translateY(20px)}
        to{opacity:1;transform:translateY(0)}
      }

      .brand{
        font-weight:700;font-size:1.15rem;letter-spacing:-.03em;
        color:var(--text);text-decoration:none;display:block;
        margin-bottom:28px;text-align:left;
      }

      .card-body{text-align:center}

      .icon-ring{
        width:64px;height:64px;border-radius:50%;
        background:var(--accent-bg);
        display:flex;align-items:center;justify-content:center;
        margin:0 auto 20px;position:relative;
      }
      .icon-ring::after{
        content:'';position:absolute;inset:-5px;border-radius:50%;
        border:1.5px solid var(--accent);opacity:.18;
        animation:ping 2.5s ease-out infinite;
      }
      @keyframes ping{
        0%{transform:scale(1);opacity:.18}
        80%,100%{transform:scale(1.25);opacity:0}
      }
      .icon-ring svg{
        width:24px;height:24px;color:var(--accent);
        animation:spin 8s linear infinite;
      }
      @keyframes spin{to{transform:rotate(360deg)}}

      .badge{
        display:inline-block;padding:4px 12px;border-radius:100px;
        font-size:.68rem;font-weight:600;letter-spacing:.06em;
        text-transform:uppercase;
        background:var(--accent-bg);color:var(--accent);
        margin-bottom:16px;
      }

      h1{
        font-family:var(--fancy);
        font-size:clamp(1.35rem,4.5vw,1.75rem);
        font-weight:600;line-height:1.3;margin-bottom:10px;
        letter-spacing:-.015em;
      }
      h1 em{font-style:italic;color:var(--accent)}

      .desc{
        color:var(--muted);font-size:clamp(.82rem,2.4vw,.9rem);
        line-height:1.7;margin:0 auto 28px;max-width:340px;
      }

      .socials{
        display:flex;flex-direction:column;gap:8px;
        margin-bottom:24px;
      }
      .s-link{
        display:flex;align-items:center;justify-content:center;gap:8px;
        padding:11px 18px;border-radius:12px;
        font-size:.82rem;font-weight:600;
        text-decoration:none;transition:all .2s ease;
        border:1px solid var(--border);color:var(--text);
        background:var(--surface);
      }
      .s-link:hover{
        transform:translateY(-1px);
        box-shadow:0 4px 12px rgba(0,0,0,.08);
        border-color:var(--accent);color:var(--accent);
      }
      .s-link svg{width:16px;height:16px;flex-shrink:0}
      .s-link.li{background:#0a66c2;color:#fff;border-color:#0a66c2}
      .s-link.li:hover{background:#004182;border-color:#004182;color:#fff;box-shadow:0 4px 12px rgba(10,102,194,.3)}

      .sep{width:40px;height:1px;background:var(--border);margin:0 auto 16px}

      .email{
        display:inline-flex;align-items:center;gap:5px;
        color:var(--muted);font-size:.78rem;text-decoration:none;
        transition:color .2s;word-break:break-all;
      }
      .email:hover{color:var(--accent)}
      .email svg{width:13px;height:13px;flex-shrink:0}

      .foot{
        margin-top:20px;font-size:.68rem;color:var(--muted);
        text-align:center;animation:up .65s cubic-bezier(.16,1,.3,1) .2s both;
      }

      @media(min-width:420px){
        .socials{flex-direction:row;justify-content:center}
        .s-link{flex:1;max-width:200px}
      }
      @media(max-width:350px){
        .card{padding:32px 20px 28px;border-radius:14px}
        .icon-ring{width:56px;height:56px;margin-bottom:16px}
        .icon-ring svg{width:20px;height:20px}
        .brand{font-size:1.05rem;margin-bottom:22px}
      }
    </style>
