<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page Not Found | Khushaank Gupta</title>
    <link rel="icon" type="image/webp" href="/assets/images/favicon.webp" />
    <meta name="theme-color" content="#1a1a1a" />
    <meta name="robots" content="noindex, nofollow" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/style.css" />

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      // Attempt to handle client-side routing fallback
      (function () {
        const path = window.location.pathname;
        if (path.includes("/pulse/")) {
          // Extract slug
          const parts = path.split("/pulse/");
          if (parts.length > 1) {
            const slugPart = parts[1].split("/")[0]; // Take segment after pulse
            const search = window.location.search;
            // Redirect to pulse index
            window.location.replace(
              "/pulse/?slug=" +
                slugPart +
                (search ? "&" + search.substring(1) : ""),
            );
          }
        }
      })();
    </script>
  </head>
  <body class="error-page">
    <div class="error-container fade-in">
      <div class="error-gif">
        <img src="https://i.postimg.cc/2yrFyxKv/giphy.gif" alt="gif_ing" />
      </div>
      <div class="error-content">
        <h1 class="main-heading">This page is gone.</h1>
        <p>
          ...maybe the page you're looking for is not found or never existed.
        </p>
        <a href="/">
          <button>Back to home <i data-lucide="arrow-right"></i></button>
        </a>
      </div>
    </div>

    <script>
      if (typeof lucide !== "undefined") {
        lucide.createIcons();
      }
    </script>
  </body>
</html>
